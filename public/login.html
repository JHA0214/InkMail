<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InkMail 로그인</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <h1>InkMail</h1>
    <form id="login-form">
      <input type="password" id="access-key" placeholder="비밀번호" autocomplete="current-password" autofocus />
      <button type="submit">입장</button>
    </form>
    <p id="login-error" class="status" hidden></p>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
